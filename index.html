<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skipit - Experimento</title>
    <link rel="icon" type="image/png" href="https://pedi.skipit.com.ar/assets/skipit_logo-982ff30d.png">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --success-green: rgb(59, 213, 139); 
            --primary-dark: rgb(4, 37, 43);    
            --text-black: rgb(10, 17, 18);     
            --gray-text: rgb(66, 80, 82);
            --bg-light: rgb(250, 250, 250);
            --border-light: rgb(224, 224, 224);
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Manrope', sans-serif;
            background-color: var(--bg-light);
            color: var(--text-black);
            overflow-x: hidden;
        }

        .view { display: none; min-height: 100vh; padding-bottom: 90px; }
        .view.active { display: block; }

        /* --- ESTILOS HOME (INICIO) --- */
        .banner-img { width: 100%; aspect-ratio: 2 / 1; object-fit: cover; } /* [cite: 2427] */
        
        .sticky-block { background: white; padding: 15px 20px; border-bottom: 1px solid var(--border-light); }
        .store-info { display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px; }
        .store-logo { width: 50px; height: 50px; border-radius: 8px; } /* [cite: 2428] */
        
        .balance-card {
            background-color: var(--primary-dark);
            color: white;
            padding: 15px 20px;
            border-radius: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 10px 0;
        } /* [cite: 2432-2433] */

        .categories-scroll {
            display: flex; gap: 10px; overflow-x: auto; padding: 10px 0;
            scrollbar-width: none;
        }
        .category-tab {
            background: var(--primary-dark); color: white;
            padding: 8px 16px; border-radius: 20px; font-size: 14px; font-weight: 600;
            white-space: nowrap;
        } /* [cite: 2434-2435] */

        /* Cuadrícula de Productos */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            padding: 15px;
        }
        .home-product-card {
            background: white; border-radius: 20px; padding: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            position: relative;
        }
        .home-product-img { width: 100%; aspect-ratio: 1/1; border-radius: 12px; object-fit: cover; }
        .add-btn-circle {
            position: absolute; bottom: 65px; right: 15px;
            background: var(--primary-dark); color: white;
            width: 32px; height: 32px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; border: none;
        } /* [cite: 2438-2439] */

        /* --- ESTILOS MIS PRODUCTOS (Anteriores) --- */
        header { padding: 30px 20px 10px 20px; font-size: 26px; font-weight: 700; }
        .product-item { display: flex; align-items: center; padding: 12px; margin: 0 15px 12px; border: 1px solid var(--border-light); border-radius: 20px; background: white; }
        .action-bar { position: fixed; bottom: 70px; left: 0; width: 100%; background: white; padding: 15px; display: flex; align-items: center; border-top: 1px solid var(--border-light); z-index: 10; }
        .confirm-btn { flex-grow: 1; margin-left: 10px; background: rgb(212, 212, 212); border: none; padding: 12px; border-radius: 25px; font-weight: 600; }
        .confirm-btn.active { background: var(--success-green); color: var(--text-black); }

        /* --- NAVEGACIÓN --- */
        nav { position: fixed; bottom: 0; width: 100%; height: 70px; background: white; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid var(--border-light); z-index: 1000; }
        .nav-item { border: none; background: none; color: #C4C4C4; padding: 10px; }
        .nav-item.active { color: var(--primary-dark); }
    </style>
</head>
<body>

    <div id="home" class="view active">
        <img src="https://assets.skipit.com.ar/60/banner_60_1770935652578" class="banner-img"> <div class="sticky-block">
            <div class="store-info">
                <div style="display: flex; gap: 12px; align-items: center;">
                    <img src="https://assets.skipit.com.ar/60/logo_60_1742138900273" class="store-logo"> <div>
                        <p style="margin:0; font-weight: 700; font-size: 18px;">Rabieta Palermo</p>
                        <p style="margin:0; font-size: 12px; font-weight: 500;">Ingreso - .</p>
                    </div>
                </div>
                <div style="background: var(--primary-dark); border-radius: 50%; width: 34px; height: 34px; display: flex; align-items: center; justify-content: center;">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                </div>
            </div>

            <div class="balance-card">
                <span style="font-weight: 700; font-size: 18px;">Mi Saldo</span>
                <span style="font-weight: 700; font-size: 18px;">$ 0,00</span>
            </div> <div class="categories-scroll">
                <div class="category-tab">Ingreso</div>
                <div class="category-tab" style="background: transparent; color: var(--gray-text);">Bebidas</div>
            </div> </div>

        <div style="padding: 15px 20px; display: flex; justify-content: space-between; align-items: center;">
            <p style="font-weight: 700; font-size: 18px; margin: 0;">Ingreso</p>
            <span style="font-size: 12px; color: var(--gray-text); font-weight: 600;">Ver más ></span>
        </div>

        <div class="product-grid">
            <div class="home-product-card">
                <img src="https://assets.skipit.com.ar/60/cropped_1768451279607.webp" class="home-product-img">
                <button class="add-btn-circle">+</button>
                <p style="font-weight: 800; font-size: 14px; margin: 8px 0 4px;">After + 2 pintas</p>
                <p style="font-weight: 500; font-size: 13px; margin: 0;">$ 25.000,00</p>
            </div>
            <div class="home-product-card">
                <img src="https://assets.skipit.com.ar/60/cropped_1768234814339.webp" class="home-product-img">
                <button class="add-btn-circle">+</button>
                <p style="font-weight: 800; font-size: 14px; margin: 8px 0 4px;">After + 2 tragos</p>
                <p style="font-weight: 500; font-size: 13px; margin: 0;">$ 30.000,00</p>
            </div>
        </div>
    </div>

    <div id="withdraw" class="view">
        <header><p>Mis productos</p></header>
        <div style="padding: 0 20px 15px; display: flex; justify-content: space-between;">
            <div>
                <p style="font-size: 14px; font-weight: 700; margin:0;">Seleccioná tus productos.</p>
                <p style="font-size: 12px; font-weight: 500; color: var(--gray-text); margin:0;">Retiralos por el mostrador.</p>
            </div>
            <button style="background:white; border:1px solid #D1D1D1; border-radius:20px; padding:6px 15px; font-weight:600;">Todos</button>
        </div>
        <ul id="mainProductList" style="list-style: none; padding: 0;">
            <li class="product-item">
                <img src="https://assets.skipit.com.ar/60/cropped_1768234915043.webp" style="width:44px; border-radius:12px; margin-right:12px;">
                <div style="flex-grow:1;"><p style="font-weight:800; margin:0;">Bebida sin alcohol ingreso</p></div>
                <input type="checkbox">
            </li>
        </ul>
        <div class="action-bar">
            <p style="font-weight: 700;">1 Producto</p>
            <button class="confirm-btn active">Confirmar Retiro</button>
        </div>
    </div>

    <div id="cart" class="view"><header><p>Carrito</p></header></div>
    <div id="perfil" class="view"><header><p>Cuenta</p></header></div>

    <nav>
        <button class="nav-item active" onclick="switchView('home', this)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        </button>
        <button class="nav-item" onclick="switchView('cart', this)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
        </button>
        <button class="nav-item" onclick="switchView('withdraw', this)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
        </button>
        <button class="nav-item" onclick="switchView('perfil', this)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </button>
    </nav>

    <script>
        function switchView(viewId, btn) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            window.scrollTo(0,0);
        }
    </script>
</body>
</html>
