<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skipit Clone - Experimento</title>
    <link rel="icon" type="image/png" href="https://pedi.skipit.com.ar/assets/skipit_logo-982ff30d.png">
    <style>
        :root {
            --primary-dark: #04252B;
            --success-green: #14C46F;
            --btn-gray: #EBEBEB;
            --text-black: rgb(10, 17, 18);
            --gray-text: #666;
            --border-light: #EBEBEB;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Manrope', sans-serif, Arial;
            background-color: white;
            color: var(--text-black);
            -webkit-tap-highlight-color: transparent;
        }

        .view { display: none; padding-bottom: 160px; }
        .view.active { display: block; }

        /* HEADER ORIGINAL */
        header {
            padding: 30px 20px 15px 20px;
            border-bottom: none;
        }
        header p { margin: 0; }

        /* INFO CONTAINER (Seleccioná + Todos) */
        ._infoContainer {
            padding: 0 20px 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }
        ._infoBox { display: flex; flex-direction: column; }

        .todos-btn {
            background: white;
            border: 1px solid #D1D1D1;
            border-radius: 20px;
            padding: 8px 20px;
            font-family: inherit;
            font-weight: 500;
            font-size: 14px;
            color: var(--text-black);
            cursor: pointer;
        }

        /* LISTA DE PRODUCTOS ORIGINAL */
        ul { list-style: none; padding: 0 15px; margin: 0; }
        
        .product-item {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            margin-bottom: 12px;
            border: 1px solid var(--border-light);
            border-radius: 12px;
            cursor: pointer;
            transition: border-color 0.2s;
        }

        .product-item.selected { border-color: var(--primary-dark); background-color: #F6FAF9; }

        .product-image img {
            width: 50px;
            height: 50px;
            border-radius: 8px;
            object-fit: cover;
            margin-right: 15px;
        }

        .product-info { flex-grow: 1; }
        .product-name { font-weight: 800; font-size: 16px; margin: 0; }

        /* CHECKBOX PERSONALIZADO */
        .radio-custom {
            width: 20px;
            height: 20px;
            border: 2px solid #D1D1D1;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .product-item.selected .radio-custom {
            background-color: var(--primary-dark);
            border-color: var(--primary-dark);
        }
        .product-item.selected .radio-custom::after {
            content: '✓'; color: white; font-size: 12px;
        }

        /* BARRA DE ACCIÓN INFERIOR */
        .action-bar {
            position: fixed;
            bottom: 70px;
            left: 0;
            width: 100%;
            background: white;
            padding: 15px 20px;
            box-sizing: border-box;
            display: none;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid var(--border-light);
            z-index: 999;
        }
        #withdraw.active ~ .action-bar { display: flex; }

        .count-text { font-size: 18px; font-weight: 700; color: var(--text-black); }

        .confirm-btn {
            flex-grow: 1;
            margin-left: 15px;
            background-color: var(--btn-gray);
            color: var(--text-black);
            border: none;
            padding: 15px;
            border-radius: 30px;
            font-weight: 500;
            font-size: 18px;
            text-align: center;
            transition: background-color 0.3s;
        }
        .confirm-btn.active { background-color: var(--success-green); }

        /* NAVEGACIÓN */
        nav {
            position: fixed; bottom: 0; width: 100%; height: 70px;
            background: white; display: flex; justify-content: space-around;
            align-items: center; border-top: 1px solid var(--border-light); z-index: 1000;
        }
        .nav-item { border: none; background: none; color: #C4C4C4; padding: 10px; }
        .nav-item.active { color: var(--primary-dark); }
    </style>
</head>
<body>

    <div id="home" class="view active">
        <div style="width: 100%; aspect-ratio: 2/1; background: url('https://assets.skipit.com.ar/60/banner_60_1770935652578') center/cover;"></div>
    </div>

    <div id="withdraw" class="view">
        <header>
            <p style="font-size: 26px; font-weight: 700; color: var(--text-black);">Mis productos</p>
        </header>
        
        <div class="_infoContainer">
            <div class="_infoBox">
                <p style="font-size: 14px; font-weight: 600;">Seleccioná tus productos.</p>
                <p style="font-size: 12px; font-weight: 500; color: var(--gray-text);">Retiralos por el mostrador.</p>
            </div>
            <button class="todos-btn" onclick="selectAll()">Todos</button>
        </div>
        
        <ul id="productList">
            <li class="product-item" onclick="toggleSelect(this)">
                <div class="product-image"><img src="https://assets.skipit.com.ar/60/cropped_1768234915043.webp"></div>
                <div class="product-info"><p class="product-name">Bebida sin alcohol ingreso</p></div>
                <div class="radio-custom"></div>
            </li>
            <li class="product-item" onclick="toggleSelect(this)">
                <div class="product-image"><img src="https://assets.skipit.com.ar/60/cropped_1768234915043.webp"></div>
                <div class="product-info"><p class="product-name">Bebida sin alcohol ingreso</p></div>
                <div class="radio-custom"></div>
            </li>
        </ul>
    </div>

    <div id="perfil" class="view"><header><p style="font-size: 26px; font-weight: 700;">Cuenta</p></header></div>

    <div class="action-bar" id="actionBar">
        <p class="count-text"><span id="count">0</span> Producto</p>
        <button id="confirmBtn" class="confirm-btn">Confirmar Retiro</button>
    </div>

    <nav>
        <button class="nav-item active" onclick="switchView('home', this)">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        </button>
        <button class="nav-item" onclick="switchView('withdraw', this)">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
        </button>
        <button class="nav-item" onclick="switchView('perfil', this)">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </button>
    </nav>

    <script>
        function switchView(viewId, btn) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('actionBar').style.display = (viewId === 'withdraw') ? 'flex' : 'none';
        }

        function toggleSelect(element) {
            element.classList.toggle('selected');
            updateState();
        }

        function selectAll() {
            const items = document.querySelectorAll('.product-item');
            const allSel = Array.from(items).every(i => i.classList.contains('selected'));
            items.forEach(i => allSel ? i.classList.remove('selected') : i.classList.add('selected'));
            updateState();
        }

        function updateState() {
            const num = document.querySelectorAll('.product-item.selected').length;
            document.getElementById('count').innerText = num;
            const btn = document.getElementById('confirmBtn');
            if (num > 0) { btn.classList.add('active'); } 
            else { btn.classList.remove('active'); }
        }
    </script>
</body>
</html>
