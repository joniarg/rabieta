
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skipit Clone - Experimento</title>
    <link rel="icon" type="image/png" href="https://pedi.skipit.com.ar/assets/skipit_logo-982ff30d.png">
    <style>
        /* Estilos base inspirados en el original */
        :root {
            --primary-dark: #04252B;
            --text-main: rgb(10, 17, 18);
            --bg-gray: #F2F2F2;
            --border-light: rgb(224, 224, 224);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Manrope', sans-serif, Arial;
            background-color: white;
            color: var(--text-main);
            overflow-x: hidden;
        }

        /* Contenedor de vistas */
        .view {
            display: none;
            padding-bottom: 80px; /* Espacio para la nav bar */
        }

        .view.active {
            display: block;
        }

        /* Header de Perfil */
        header {
            padding: 20px;
            font-size: 26px;
            font-weight: 700;
            border-bottom: 1px solid var(--border-light);
        }

        /* Banner de Home */
        .banner {
            width: 100%;
            aspect-ratio: 2 / 1;
            background: url('https://assets.skipit.com.ar/60/banner_60_1770935652578') center/cover;
        }

        /* Info del Local */
        .commerce-info {
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .commerce-info img {
            width: 50px;
            height: 50px;
            border-radius: 8px;
        }

        /* Barra de Navegación Inferior */
        nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 65px;
            background: white;
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid var(--border-light);
            z-index: 1000;
        }

        .nav-item {
            border: none;
            background: none;
            padding: 10px;
            cursor: pointer;
            color: #C4C4C4; /* Color desactivado */
            transition: color 0.3s;
        }

        .nav-item.active {
            color: var(--primary-dark);
        }

        /* Contenido de Perfil */
        .profile-card {
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .menu-item {
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-light);
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div id="home" class="view active">
        <div class="banner"></div>
        <div class="commerce-info">
            <img src="https://802342-menu-img.s3.us-east-2.amazonaws.com/60/logo_60_1742138900273" alt="Logo">
            <div>
                <div style="font-weight: 700; font-size: 18px;">Rabieta Palermo</div>
                <div style="font-size: 12px; font-weight: 500;">Ingreso - .</div>
            </div>
        </div>
        <div style="padding: 40px; text-align: center; color: #D4D4D4;">
            <p>Contenido de la tienda aquí...</p>
        </div>
    </div>

    <div id="perfil" class="view">
        <header>Cuenta</header>
        <div class="profile-card">
            <svg width="45" height="45" viewBox="0 0 22 22" fill="none"><circle cx="11.2" cy="7.2" r="4.3" fill="#C4C4C4"/><path d="M11.2 0C5.3 0 .5 4.8.5 10.8s4.8 10.8 10.7 10.8 10.8-4.8 10.8-10.8S17.1 0 11.2 0zM18.7 16.4c-.7-2.4-3-4.2-5.6-4.2h-3.7c-2.7 0-4.9 1.8-5.7 4.2C2.6 14.8 1.9 12.9 1.9 10.8c0-5.2 4.2-9.4 9.3-9.4s9.4 4.2 9.4 9.4c0 2.1-.7 4-1.9 5.6z" fill="#C4C4C4"/></svg>
            <div>
                <div style="font-weight: 700; font-size: 20px;">joniker Ormaetxea</div>
                <div style="font-size: 12px; font-weight: 500;">joniorma123@gmail.com</div>
            </div>
        </div>
        <div class="menu-item">Historial de compras <span>></span></div>
        <div class="menu-item">Soporte <span>></span></div>
        <div class="menu-item" style="color: red;">Cerrar sesión</div>
    </div>

    <div id="payment" class="view"><header>Pagos</header></div>
    <div id="withdraw" class="view"><header>Retiros</header></div>

    <nav>
        <button class="nav-item active" onclick="switchView('home', this)">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 21V16a1 1 0 0 0-1-1h-4a1 1 0 0 0-1 1v5"/><path d="M3 10l9-7 9 7v11a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1z"/></svg>
        </button>
        <button class="nav-item" onclick="switchView('payment', this)">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
        </button>
        <button class="nav-item" onclick="switchView('withdraw', this)">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 10a4 4 0 1 0-8 0"/><path d="M3 6h18v14a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1z"/></svg>
        </button>
        <button class="nav-item" onclick="switchView('perfil', this)">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </button>
    </nav>

    <script>
        function switchView(viewId, btn) {
            // Ocultar todas las vistas [cite: 11, 1293]
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            // Mostrar la seleccionada
            document.getElementById(viewId).classList.add('active');
            
            // Cambiar estado activo en la nav bar [cite: 11]
            document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }
    </script>
</body>
</html>
