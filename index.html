<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skipit - Experimento</title>
    <link rel="icon" type="image/png" href="https://pedi.skipit.com.ar/assets/skipit_logo-982ff30d.png">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --success-green: rgb(59, 213, 139); /* Verde exacto del fondo [cite: 77] */
            --swipe-red: rgb(255, 79, 94);     /* Rojo del aviso [cite: 96] */
            --primary-dark: rgb(4, 37, 43);    /* Azul oscuro Skipit [cite: 104] */
            --track-green: rgb(203, 250, 221); /* Fondo del deslizador [cite: 99] */
            --progress-green: rgb(81, 206, 44);/* Barra de progreso [cite: 100] */
            --text-black: rgb(10, 17, 18);
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Manrope', sans-serif;
            background-color: rgb(250, 250, 250);
            color: var(--text-black);
            overflow-x: hidden;
        }

        .view { display: none; min-height: 100vh; }
        .view.active { display: block; }

        /* --- PANTALLA PRINCIPAL RETIROS --- */
        #withdraw { padding-bottom: 160px; }
        header { padding: 30px 20px 10px 20px; font-size: 26px; font-weight: 700; }
        
        ._infoContainer { padding: 0 20px 15px 20px; display: flex; justify-content: space-between; align-items: flex-start; }
        .todos-btn { background: white; border: 1px solid #D1D1D1; border-radius: 16px; padding: 6px 18px; font-weight: 500; cursor: pointer; }

        ul { list-style: none; padding: 0 15px; }
        .product-item {
            display: flex; align-items: center; padding: 1rem; margin-bottom: 11px;
            border: 1px solid rgb(214, 218, 219); border-radius: 20px; background: white;
        }
        .product-item.selected { border-color: var(--text-black); }
        .product-image img { width: 44px; height: 44px; border-radius: 16px; margin-right: 15px; object-fit: cover; }
        .product-info { flex-grow: 1; }
        .product-name { font-weight: 800; font-size: 16px; }

        /* BARRA ACCIÓN */
        .action-bar {
            position: fixed; bottom: 70px; left: 0; width: 100%; background: rgb(247, 247, 247);
            padding: 16px 16px 20px; box-sizing: border-box; display: flex;
            justify-content: space-between; align-items: center; border-top: 1px solid #EBEBEB; z-index: 10;
        }
        .confirm-btn { flex-grow: 1; margin-left: 10px; background-color: #D4D4D4; color: white; border: none; padding: 12px; border-radius: 25px; font-weight: 600; font-size: 18px; }
        .confirm-btn.active { background-color: var(--progress-green); color: var(--text-black); cursor: pointer; }

        /* --- PANTALLA DE RETIRO (FONDO VERDE) --- [cite: 77] */
        #retiroConfirmView {
            position: fixed; top: 0; left: 0; width: 100%; height: 100dvh;
            background-color: var(--success-green); z-index: 2000; display: none;
        }

        .badge-no-swipe {
            background-color: var(--swipe-red); color: white; padding: 28px 16px;
            margin: 0 18px; text-align: center; font-weight: 700; font-size: 18px;
            border-radius: 20px; border: 1px solid rgb(251, 183, 181); [cite: 96]
        }

        .retiro-card {
            background: rgb(253, 253, 253); border-radius: 32px; padding: 18px;
            margin: 10px 18px; box-shadow: rgba(163, 172, 173, 0.3) 0px 4px 15px; [cite: 78]
        }

        .swipe-track {
            position: relative; background-color: var(--track-green); height: 70px;
            border-radius: 50px; margin: 20px; display: flex; align-items: center;
            justify-content: center; overflow: hidden; [cite: 99]
        }
        .swipe-progress { position: absolute; left: 0; height: 100%; background: var(--progress-green); width: 0; }
        .swipe-thumb {
            position: absolute; left: 3px; width: 63px; height: 63px;
            background-color: var(--primary-dark); border-radius: 50%; display: flex;
            align-items: center; justify-content: center; color: white; z-index: 10; [cite: 104]
        }

        /* NAV */
        nav { position: fixed; bottom: 0; width: 100%; height: 70px; background: white; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #EBEBEB; }
        .nav-item { border: none; background: none; color: #C4C4C4; }
        .nav-item.active { color: var(--progress-green); }
    </style>
</head>
<body>

    <div id="withdraw" class="view active">
        <header><p>Mis productos</p></header>
        <div class="_infoContainer">
            <div>
                <p style="font-size: 14px; font-weight: 600;">Seleccioná tus productos.</p>
                <p style="font-size: 12px; font-weight: 500; color: var(--gray-text);">Retiralos por el mostrador.</p>
            </div>
            <button class="todos-btn" onclick="selectAll()">Todos</button>
        </div>
        <ul>
            <li class="product-item" onclick="toggleSelect(this)">
                <div class="product-image"><img src="https://assets.skipit.com.ar/60/cropped_1768234915043.webp"></div>
                <div class="product-info"><p class="product-name">Bebida sin alcohol ingreso</p></div>
                <input type="checkbox" style="width: 18px; height: 18px; accent-color: var(--primary-dark);">
            </li>
        </ul>
        <div class="action-bar">
            <p style="font-size: 18px; font-weight: 700;"><span id="count">0</span> Producto</p>
            <button id="confirmBtn" class="confirm-btn" onclick="openConfirm()">Confirmar Retiro</button>
        </div>
    </div>

    <div id="retiroConfirmView">
        <header style="display: flex; align-items: center;">
            <span onclick="closeConfirm()" style="font-size: 24px; margin-right: 15px;">✕</span>
            <p>Retiro</p>
        </header>
        <div class="badge-no-swipe">¡NO hagas swipe antes de retirar!</div>
        <div class="retiro-card">
            <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 15px;">
                <img src="https://assets.skipit.com.ar/60/logo_60_1742138900273" width="50" height="50">
                <div>
                    <p style="font-weight: 700; margin: 0;">Rabieta Palermo</p>
                    <p style="font-size: 12px; margin: 0;">Ingreso - .</p>
                </div>
            </div>
            <p style="font-size: 16px; font-weight: 800; color: #425052;">Hora <span id="time">20:00</span></p>
            <hr style="border: 0; border-top: 1px solid #EEE;">
            <div style="display: flex; justify-content: space-between; font-weight: 700;">
                <span>Estas retirando</span>
                <span>Total: <span id="finalCount">1</span></span>
            </div>
        </div>
        <div class="swipe-track" id="track">
            <div class="swipe-progress" id="progress"></div>
            <span style="position: absolute; font-weight: 700;">Retirado</span>
            <div class="swipe-thumb" id="handle">➜</div>
        </div>
    </div>

    <nav id="mainNav">
        <button class="nav-item">🏠</button>
        <button class="nav-item">🛒</button>
        <button class="nav-item active">💼</button>
        <button class="nav-item">👤</button>
    </nav>

    <script>
        function toggleSelect(el) {
            el.classList.toggle('selected');
            const check = el.querySelector('input');
            check.checked = !check.checked;
            update();
        }

        function update() {
            const n = document.querySelectorAll('.product-item.selected').length;
            document.getElementById('count').innerText = n;
            const btn = document.getElementById('confirmBtn');
            if(n > 0) btn.classList.add('active');
            else btn.classList.remove('active');
        }

        function openConfirm() {
            const n = document.getElementById('count').innerText;
            if(n == "0") return;
            document.getElementById('finalCount').innerText = n;
            document.getElementById('time').innerText = new Date().toLocaleTimeString();
            document.getElementById('retiroConfirmView').style.display = 'block';
        }

        function closeConfirm() {
            document.getElementById('retiroConfirmView').style.display = 'none';
        }
        
        // Lógica básica de swipe para el experimento
        const handle = document.getElementById('handle');
        handle.ontouchmove = (e) => {
            let x = e.touches[0].clientX - 40;
            if(x > 0 && x < 250) {
                handle.style.left = x + 'px';
                document.getElementById('progress').style.width = x + 30 + 'px';
            }
            if(x >= 240) {
                alert("¡Retiro confirmado!");
                location.reload();
            }
        }
    </script>
</body>
</html>
