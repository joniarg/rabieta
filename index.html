<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skipit - Experimento</title>
    <link rel="icon" type="image/png" href="https://pedi.skipit.com.ar/assets/skipit_logo-982ff30d.png">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Colores extraídos exactamente del código fuente de Skipit */
            --success-green: rgb(59, 213, 139); 
            --swipe-red: rgb(255, 79, 94);     
            --primary-dark: rgb(4, 37, 43);    
            --track-green: rgb(203, 250, 221); 
            --progress-green: rgb(81, 206, 44);
            --text-black: rgb(10, 17, 18);     
            --btn-gray: rgb(212, 212, 212);    
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Manrope', sans-serif;
            background-color: rgb(250, 250, 250);
            color: var(--text-black);
        }

        .view { display: none; min-height: 100vh; }
        .view.active { display: block; }

        /* --- PANTALLA SELECCIÓN --- */
        #withdraw { padding-bottom: 160px; }
        header { padding: 30px 20px 10px 20px; font-size: 26px; font-weight: 700; }
        
        ._infoContainer { padding: 0 20px 15px 20px; display: flex; justify-content: space-between; }
        .todos-btn { background: white; border: 1px solid rgb(214, 218, 219); border-radius: 16px; padding: 6px 18px; font-weight: 500; cursor: pointer; }

        ul { list-style: none; padding: 0 15px; margin: 0; }
        .product-item {
            display: flex; align-items: center; padding: 1rem; margin-bottom: 11px;
            border: 1px solid rgb(214, 218, 219); border-radius: 20px; background: white; cursor: pointer;
        }
        .product-item.selected { border: 1px solid var(--text-black); }
        .product-image img { width: 44px; height: 44px; border-radius: 16px; margin-right: 15px; object-fit: cover; }
        .product-info { flex-grow: 1; }
        .product-name { font-weight: 800; font-size: 16px; }

        /* BARRA ACCIÓN CORREGIDA */
        .action-bar {
            position: fixed; bottom: 70px; left: 0; width: 100%; background: rgb(247, 247, 247);
            padding: 16px 16px 65px; box-sizing: border-box; display: flex;
            justify-content: space-between; align-items: center; border-top: 1px solid #EBEBEB; z-index: 10;
        }
        .confirm-btn { 
            flex-grow: 1; margin-left: 10px; 
            background-color: var(--btn-gray); /* Gris por defecto */
            color: var(--text-black); /* Letras negras siempre */
            border: none; padding: 10px 20px; border-radius: 25px; 
            font-weight: 500; font-size: 18px; transition: background-color 0.3s;
        }
        .confirm-btn.active { 
            background-color: var(--success-green); /* Verde corregido */
            cursor: pointer; 
        }

        /* --- PANTALLA RETIRO --- */
        #retiroConfirmView {
            position: fixed; top: 0; left: 0; width: 100%; height: 100dvh;
            background-color: var(--success-green); z-index: 2000; display: none; overflow-y: auto;
        }

        .badge-no-swipe {
            background-color: var(--swipe-red); color: white; padding: 28px 16px;
            margin: 0 18px; text-align: center; font-weight: 700; font-size: 18px;
            border-radius: 20px; border: 1px solid rgb(251, 183, 181);
        }

        .retiro-card {
            background: rgb(253, 253, 253); border-radius: 32px; padding: 18px;
            margin: 10px 18px; box-shadow: rgba(163, 172, 173, 0.3) 0px 4px 15px;
        }

        ._itemRow { display: flex; gap: 1rem; align-items: center; padding: 10px 26px; border-bottom: 1px solid rgb(214, 218, 219); }

        .swipe-track {
            position: relative; background-color: var(--track-green); height: 70px;
            border-radius: 50px; margin: 40px 20px; display: flex; align-items: center;
            justify-content: center; overflow: hidden;
        }
        .swipe-progress { position: absolute; left: 0; height: 100%; background: var(--progress-green); width: 0; pointer-events: none; }
        .swipe-thumb {
            position: absolute; left: 3px; width: 63px; height: 63px;
            background-color: var(--primary-dark); border-radius: 50%; display: flex;
            align-items: center; justify-content: center; color: white; z-index: 10; cursor: grab;
        }

        nav { position: fixed; bottom: 0; width: 100%; height: 70px; background: white; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #EBEBEB; }
        .nav-item { border: none; background: none; color: #C4C4C4; font-size: 20px; }
        .nav-item.active { color: var(--primary-dark); }
    </style>
</head>
<body>

    <div id="withdraw" class="view active">
        <header><p>Mis productos</p></header>
        <div class="_infoContainer">
            <div>
                <p style="font-size: 14px; font-weight: 700; margin:0;">Seleccioná tus productos.</p>
                <p style="font-size: 12px; font-weight: 500; color: var(--gray-text); margin:0;">Retiralos por el mostrador.</p>
            </div>
            <button class="todos-btn" onclick="selectAll()">Todos</button>
        </div>
        <ul id="mainProductList">
            <li class="product-item" onclick="toggleSelect(this)">
                <div class="product-image"><img src="https://assets.skipit.com.ar/60/cropped_1768234915043.webp"></div>
                <div class="product-info"><p class="product-name">Bebida sin alcohol ingreso</p></div>
                <input type="checkbox" style="width: 18px; height: 18px; accent-color: var(--primary-dark);">
            </li>
            <li class="product-item" onclick="toggleSelect(this)">
                <div class="product-image"><img src="https://assets.skipit.com.ar/60/cropped_1768234915043.webp"></div>
                <div class="product-info"><p class="product-name">Cerveza Rabieta</p></div>
                <input type="checkbox" style="width: 18px; height: 18px; accent-color: var(--primary-dark);">
            </li>
        </ul>
        <div class="action-bar">
            <p style="font-size: 18px; font-weight: 700; margin:0;"><span id="count">0</span> Producto</p>
            <button id="confirmBtn" class="confirm-btn" onclick="openConfirm()">Confirmar Retiro</button>
        </div>
    </div>

    <div id="retiroConfirmView">
        <header style="display: flex; align-items: center; justify-content: space-between;">
            <p>Retiro</p>
            <span onclick="closeConfirm()" style="font-size: 24px; cursor: pointer;">✕</span>
        </header>
        <div class="badge-no-swipe">¡NO hagas swipe antes de retirar!</div>
        
        <div class="retiro-card">
            <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 15px;">
                <img src="https://assets.skipit.com.ar/60/logo_60_1742138900273" width="50" height="50">
                <div><p style="font-weight: 700; margin: 0;">Rabieta Palermo</p></div>
            </div>
            <p style="font-size: 16px; font-weight: 800; color: rgb(66, 80, 82);">Hora <span id="time">00:00:00</span></p>
            <div id="dynamicItems"></div>
        </div>

        <div class="swipe-track" id="track">
            <div class="swipe-progress" id="progress"></div>
            <span style="position: absolute; font-weight: 700;">Retirado</span>
            <div class="swipe-thumb" id="handle">➜</div>
        </div>
    </div>

    <nav id="mainNav">
        <button class="nav-item">🏠</button><button class="nav-item">🛒</button>
        <button class="nav-item active">💼</button><button class="nav-item">👤</button>
    </nav>

    <script>
        function toggleSelect(el) {
            el.classList.toggle('selected');
            el.querySelector('input').checked = el.classList.contains('selected');
            update();
        }

        function selectAll() {
            const items = document.querySelectorAll('.product-item');
            const anyUnselected = Array.from(items).some(i => !i.classList.contains('selected'));
            items.forEach(i => {
                if(anyUnselected) i.classList.add('selected');
                else i.classList.remove('selected');
                i.querySelector('input').checked = i.classList.contains('selected');
            });
            update();
        }

        function update() {
            const n = document.querySelectorAll('.product-item.selected').length;
            document.getElementById('count').innerText = n;
            const btn = document.getElementById('confirmBtn');
            if(n > 0) btn.classList.add('active');
            else btn.classList.remove('active');
        }

        function openConfirm() {
            const selectedItems = document.querySelectorAll('.product-item.selected');
            if(selectedItems.length === 0) return;
            const container = document.getElementById('dynamicItems');
            container.innerHTML = '';
            selectedItems.forEach(item => {
                const name = item.querySelector('.product-name').innerText;
                container.innerHTML += `<div class="_itemRow"><p style="font-weight:700;">1</p><p style="font-weight:700;">${name}</p></div>`;
            });
            document.getElementById('time').innerText = new Date().toLocaleTimeString('es-AR');
            document.getElementById('retiroConfirmView').style.display = 'block';
            document.getElementById('mainNav').style.display = 'none';
        }

        function closeConfirm() {
            document.getElementById('retiroConfirmView').style.display = 'none';
            document.getElementById('mainNav').style.display = 'flex';
        }
        
        // --- LÓGICA DE SWIPE Y ELIMINACIÓN ---
        const handle = document.getElementById('handle');
        const track = document.getElementById('track');
        let isDragging = false;
        let startX = 0;

        handle.addEventListener('touchstart', (e) => { isDragging = true; startX = e.touches[0].clientX; handle.style.transition = 'none'; });
        document.addEventListener('touchmove', (e) => {
            if (!isDragging) return;
            let diff = e.touches[0].clientX - startX;
            let maxMove = track.offsetWidth - handle.offsetWidth - 10;
            if (diff > 0 && diff <= maxMove) {
                handle.style.transform = `translateX(${diff}px)`;
                document.getElementById('progress').style.width = (diff + 30) + 'px';
            }
            if (diff > maxMove) {
                isDragging = false;
                confirmFinish(); // Lógica para borrar los productos
            }
        });

        document.addEventListener('touchend', () => { if (!isDragging) return; isDragging = false; handle.style.transition = 'transform 0.3s'; handle.style.transform = 'translateX(0px)'; document.getElementById('progress').style.width = '0'; });

        function confirmFinish() {
            // 1. Encontrar y eliminar los elementos seleccionados de la lista principal
            const selectedItems = document.querySelectorAll('.product-item.selected');
            selectedItems.forEach(item => item.remove()); // Borra del diseño 
            
            // 2. Resetear contadores y cerrar pantallas
            update();
            alert("¡Productos retirados con éxito!");
            closeConfirm();
        }
    </script>
</body>
</html>
