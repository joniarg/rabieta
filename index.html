<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skipit Clone - Experimento</title>
    <link rel="icon" type="image/png" href="https://pedi.skipit.com.ar/assets/skipit_logo-982ff30d.png">
    <style>
        :root {
            --primary-dark: #04252B;
            --text-main: #0A1112;
            --gray-text: #666;
            --border-light: #E0E0E0;
            --accent-color: #04252B; /* Color para el check */
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Manrope', sans-serif, Arial;
            background-color: white;
            color: var(--text-main);
            -webkit-tap-highlight-color: transparent;
        }

        .view {
            display: none;
            padding-bottom: 80px;
        }

        .view.active { display: block; }

        header {
            padding: 30px 20px 15px 20px;
            font-size: 28px;
            font-weight: 800;
        }

        /* --- VISTA RETIROS (CONSUMICIONES) --- */
        .section-title {
            padding: 10px 20px;
            font-size: 14px;
            font-weight: 600;
            color: var(--gray-text);
            text-transform: uppercase;
        }

        .item-list {
            margin-top: 10px;
        }

        .consumicion-item {
            display: flex;
            align-items: center;
            padding: 15px 20px;
            border-bottom: 1px solid var(--border-light);
            cursor: pointer;
        }

        .consumicion-icon {
            width: 45px;
            height: 45px;
            background: #F2F2F2;
            border-radius: 8px;
            margin-right: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .consumicion-info { flex-grow: 1; }
        .consumicion-info .name { font-weight: 700; font-size: 16px; }
        .consumicion-info .desc { font-size: 12px; color: var(--gray-text); }

        /* El recuadro de selección a la derecha */
        .selector-box {
            width: 22px;
            height: 22px;
            border: 2px solid #DDD;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .consumicion-item.selected .selector-box {
            background-color: var(--primary-dark);
            border-color: var(--primary-dark);
        }

        .consumicion-item.selected .selector-box::after {
            content: '✓';
            color: white;
            font-size: 14px;
            font-weight: bold;
        }

        /* --- BARRA DE NAVEGACIÓN --- */
        nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 70px;
            background: white;
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid var(--border-light);
            z-index: 1000;
        }

        .nav-item {
            border: none;
            background: none;
            padding: 10px;
            color: #C4C4C4;
        }

        .nav-item.active { color: var(--primary-dark); }

        /* Estilos Home */
        .banner { width: 100%; aspect-ratio: 2/1; background: url('https://assets.skipit.com.ar/60/banner_60_1770935652578') center/cover; }
    </style>
</head>
<body>

    <div id="home" class="view active">
        <div class="banner"></div>
        <div style="padding: 20px;">
            <div style="font-weight: 800; font-size: 22px;">Rabieta Palermo</div>
            <p style="color: var(--gray-text);">Explora el menú y añade tus consumiciones.</p>
        </div>
    </div>

    <div id="payment" class="view">
        <header>Carrito</header>
        <div style="padding: 40px; text-align: center; color: #CCC;">
            Tu carrito está vacío.
        </div>
    </div>

    <div id="withdraw" class="view">
        <header>Mis productos</header>
        <div class="section-title">Seleccioná tus productos.</div>
        
        <div class="item-list">
            <div class="consumicion-item" onclick="toggleSelect(this)">
                <div class="consumicion-icon">🍺</div>
                <div class="consumicion-info">
                    <div class="name">Bebida sin alcohol ingreso</div>
                </div>
                <div class="selector-box"></div>
            </div>

            <div class="consumicion-item" onclick="toggleSelect(this)">
                <div class="consumicion-icon">🍔</div>
                <div class="consumicion-info">
                    <div class="name">Bebida sin alcohol ingreso</div>
                </div>
                <div class="selector-box"></div>
            </div>
            
            <div class="consumicion-item" onclick="toggleSelect(this)">
                <div class="consumicion-icon">🍟</div>
                <div class="consumicion-info">
                    <div class="name">Papas Fritas</div>
                </div>
                <div class="selector-box"></div>
            </div>
        </div>
    </div>

    <div id="perfil" class="view">
        <header>Cuenta</header>
        <div style="padding: 20px; display: flex; align-items: center; gap: 15px;">
            <div style="width: 50px; height: 50px; background: #EEE; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px;">👤</div>
            <div>
                <div style="font-weight: 700; font-size: 18px;">joniker Ormaetxea</div>
                <div style="font-size: 13px; color: var(--gray-text);">joniorma123@gmail.com</div>
            </div>
        </div>
    </div>

    <nav>
        <button class="nav-item active" onclick="switchView('home', this)">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        </button>
        <button class="nav-item" onclick="switchView('payment', this)">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
        </button>
        <button class="nav-item" onclick="switchView('withdraw', this)">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
        </button>
        <button class="nav-item" onclick="switchView('perfil', this)">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </button>
    </nav>

    <script>
        function switchView(viewId, btn) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        // Función para seleccionar/deseleccionar consumiciones
        function toggleSelect(element) {
            element.classList.toggle('selected');
        }
    </script>
</body>
</html>
