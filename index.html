<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skipit - Experimento</title>
    <link rel="icon" type="image/png" href="https://pedi.skipit.com.ar/assets/skipit_logo-982ff30d.png">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --success-green: rgb(59, 213, 139); 
            --swipe-red: rgb(255, 79, 94);     
            --primary-dark: rgb(4, 37, 43);    
            --track-green: rgb(203, 250, 221); 
            --progress-green: rgb(81, 206, 44);
            --text-black: rgb(10, 17, 18);     
            --btn-gray: rgb(212, 212, 212);
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Manrope', sans-serif;
            background-color: rgb(250, 250, 250);
            color: var(--text-black);
        }

        .view { display: none; min-height: 100vh; }
        .view.active { display: block; }

        /* --- SELECCIÓN --- */
        #withdraw { padding-bottom: 160px; }
        header { padding: 30px 20px 15px 20px; font-size: 26px; font-weight: 700; }
        ._infoContainer { padding: 0 20px 15px 20px; display: flex; justify-content: space-between; }
        .todos-btn { background: white; border: 1px solid rgb(214, 218, 219); border-radius: 20px; padding: 8px 20px; font-weight: 500; cursor: pointer; }

        ul { list-style: none; padding: 0 15px; margin: 0; }
        .product-item {
            display: flex; align-items: center; padding: 12px 15px; margin-bottom: 12px;
            border: 1px solid rgb(214, 218, 219); border-radius: 20px; background: white; cursor: pointer;
        }
        .product-item.selected { border: 1px solid var(--text-black); }
        .product-image img { width: 44px; height: 44px; border-radius: 16px; margin-right: 15px; object-fit: cover; }
        .product-info { flex-grow: 1; }
        .product-name { font-weight: 800; font-size: 16px; }

        .action-bar {
            position: fixed; bottom: 70px; left: 0; width: 100%; background: rgb(247, 247, 247);
            padding: 16px 16px 65px; box-sizing: border-box; display: flex;
            justify-content: space-between; align-items: center; border-top: 1px solid #EBEBEB; z-index: 10;
        }
        .confirm-btn { flex-grow: 1; margin-left: 10px; background-color: var(--btn-gray); color: var(--text-black); border: none; padding: 10px 20px; border-radius: 25px; font-weight: 500; font-size: 18px; transition: 0.3s; }
        .confirm-btn.active { background-color: var(--success-green); cursor: pointer; }

        /* --- PANTALLA RETIRO --- */
        #retiroConfirmView, #retiroSuccessView {
            position: fixed; top: 0; left: 0; width: 100%; height: 100dvh;
            background-color: var(--success-green); z-index: 2000; display: none; overflow-y: auto;
        }

        .badge-no-swipe {
            background-color: var(--swipe-red); color: white; padding: 28px 16px;
            margin: 0 18px; text-align: center; font-weight: 700; font-size: 18px;
            border-radius: 20px; border: 1px solid rgb(251, 183, 181);
        }

        .retiro-card {
            background: white; border-radius: 32px; padding: 18px;
            margin: 10px 18px; box-shadow: rgba(163, 172, 173, 0.3) 0px 4px 15px;
        }
        ._itemRow { display: flex; gap: 1rem; align-items: center; padding: 10px 26px; border-bottom: 1px solid rgb(214, 218, 219); }

        .swipe-track {
            position: relative; background-color: var(--track-green); height: 70px;
            border-radius: 50px; margin: 40px 20px; display: flex; align-items: center;
            justify-content: center; overflow: hidden;
        }
        .swipe-progress { position: absolute; left: 0; height: 100%; background: var(--progress-green); width: 0; border-radius: 50px; }
        .swipe-thumb { position: absolute; left: 3px; width: 63px; height: 63px; background-color: var(--primary-dark); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; z-index: 10; }

        /* --- PANTALLA ÉXITO (NUEVA) --- */
        .success-container {
            height: 80vh; display: flex; flex-direction: column;
            justify-content: center; align-items: center; gap: 10px;
        }

        nav { position: fixed; bottom: 0; width: 100%; height: 70px; background: white; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #EBEBEB; z-index: 1000; }
        .nav-item { border: none; background: none; color: #C4C4C4; padding: 10px; }
        .nav-item.active { color: var(--primary-dark); }
    </style>
</head>
<body>

    <div id="withdraw" class="view active">
        <header><p>Mis productos</p></header>
        <div class="_infoContainer">
            <div>
                <p style="font-size: 14px; font-weight: 700; margin:0;">Seleccioná tus productos.</p>
                <p style="font-size: 12px; font-weight: 500; color: #666; margin:0;">Retiralos por el mostrador.</p>
            </div>
            <button class="todos-btn" onclick="selectAll()">Todos</button>
        </div>
        <ul id="mainProductList">
            <li class="product-item" onclick="toggleSelect(this)">
                <div class="product-image"><img src="https://assets.skipit.com.ar/60/cropped_1768234915043.webp"></div>
                <div class="product-info"><p class="product-name">Bebida sin alcohol ingreso</p></div>
                <input type="checkbox" style="width: 18px; height: 18px; accent-color: var(--primary-dark);">
            </li>
        </ul>
        <div class="action-bar">
            <p style="font-size: 18px; font-weight: 700; margin:0;"><span id="count">0</span> Producto</p>
            <button id="confirmBtn" class="confirm-btn" onclick="openConfirm()">Confirmar Retiro</button>
        </div>
    </div>

    <div id="retiroConfirmView">
        <header style="display: flex; align-items: center; justify-content: space-between;">
            <p>Retiro</p>
            <span onclick="closeConfirm()" style="font-size: 24px; cursor: pointer;">✕</span>
        </header>
        <div class="badge-no-swipe">¡NO hagas swipe antes de retirar!</div>
        <div class="retiro-card">
            <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 15px;">
                <img src="https://assets.skipit.com.ar/60/logo_60_1742138900273" width="50" height="50">
                <div><p style="font-weight: 700; margin: 0;">Rabieta Palermo</p></div>
            </div>
            <p style="font-size: 16px; font-weight: 800; color: rgb(66, 80, 82);">Hora <span id="time">00:00:00</span></p>
            <div id="dynamicItems"></div>
        </div>
        <div class="swipe-track" id="track">
            <div class="swipe-progress" id="progress"></div>
            <span style="position: absolute; font-weight: 700; color: var(--text-black);">Retirado</span>
            <div class="swipe-thumb" id="handle">
                <svg width="35" height="35" viewBox="0 0 25 25" fill="white"><path d="M7.83114 19.7627C8.25416 20.2524 8.9744 20.3332 9.49325 19.9697L9.59481 19.8916L17.0401 13.4609C17.3151 13.2235 17.4727 12.8779 17.4727 12.5146C17.4727 12.1515 17.3149 11.8067 17.0401 11.5693L9.59481 5.13867L9.49325 5.05957C8.97439 4.69625 8.25409 4.77784 7.83114 5.26758C7.38019 5.78995 7.43793 6.57906 7.96005 7.03027L14.3106 12.5156L7.96005 17.999L7.86825 18.0879C7.43298 18.5483 7.40809 19.2728 7.83114 19.7627Z" fill="currentColor"></path></svg>
            </div>
        </div>
    </div>

    <div id="retiroSuccessView">
        <header><p>Retiro</p></header>
        <div class="success-container">
            <svg width="108" height="108" viewBox="0 0 108 108" fill="none">
                <circle cx="54" cy="54" r="54" fill="#F2F2F2"/>
                <path d="M68.6975 35.6647C66.9589 35.9808 65.4311 36.9291 64.4301 38.3515L49.2048 59.6881L42.8301 53.3135C40.354 50.8374 36.034 50.8374 33.5053 53.3135C30.9765 55.7896 30.9238 60.0569 33.5053 62.6384L45.3589 74.492C46.5706 75.7037 48.2565 76.4413 49.995 76.4413C50.1531 76.4413 50.3638 76.4413 50.5218 76.4413C52.4711 76.2832 54.2097 75.2823 55.316 73.7018L75.0721 46.0432C77.1794 43.093 76.4945 38.9837 73.5443 36.8764C72.1218 35.8754 70.3833 35.454 68.6448 35.7174L68.6975 35.6647Z" fill="#3BD58B"/>
            </svg>
            <p style="font-size: 18px; font-weight: 700; margin-top: 15px;">¡Retiraste tus productos!</p>
            <button onclick="location.reload()" style="margin-top: 30px; background: white; border: none; padding: 10px 20px; border-radius: 20px; font-weight: 700;">Volver al inicio</button>
        </div>
    </div>

    <nav id="mainNav">
        <button class="nav-item">🏠</button><button class="nav-item">🛒</button>
        <button class="nav-item active">💼</button><button class="nav-item">👤</button>
    </nav>

    <script>
        function toggleSelect(el) { el.classList.toggle('selected'); el.querySelector('input').checked = el.classList.contains('selected'); update(); }
        function selectAll() { const items = document.querySelectorAll('.product-item'); const anyUn = Array.from(items).some(i => !i.classList.contains('selected')); items.forEach(i => { if(anyUn) i.classList.add('selected'); else i.classList.remove('selected'); i.querySelector('input').checked = i.classList.contains('selected'); }); update(); }
        function update() { const n = document.querySelectorAll('.product-item.selected').length; document.getElementById('count').innerText = n; const btn = document.getElementById('confirmBtn'); if(n > 0) btn.classList.add('active'); else btn.classList.remove('active'); }
        function openConfirm() {
            const sel = document.querySelectorAll('.product-item.selected'); if(sel.length === 0) return;
            const cont = document.getElementById('dynamicItems'); cont.innerHTML = '';
            sel.forEach(i => { cont.innerHTML += `<div class="_itemRow"><p style="font-weight:700;">1</p><p style="font-weight:700;">${i.querySelector('.product-name').innerText}</p></div>`; });
            document.getElementById('time').innerText = new Date().toLocaleTimeString('es-AR');
            document.getElementById('retiroConfirmView').style.display = 'block';
            document.getElementById('mainNav').style.display = 'none';
        }
        function closeConfirm() { document.getElementById('retiroConfirmView').style.display = 'none'; document.getElementById('mainNav').style.display = 'flex'; }
        
        // SWIPE LOGIC
        const h = document.getElementById('handle'), t = document.getElementById('track'), p = document.getElementById('progress');
        let isD = false, sX = 0;
        h.addEventListener('touchstart', (e) => { isD = true; sX = e.touches[0].clientX; h.style.transition = 'none'; });
        document.addEventListener('touchmove', (e) => {
            if (!isD) return;
            let diff = e.touches[0].clientX - sX;
            let max = t.offsetWidth - h.offsetWidth - 6;
            if (diff > 0 && diff <= max) { h.style.transform = `translateX(${diff}px)`; p.style.width = (diff + 30) + 'px'; }
            if (diff > max) { isD = false; showSuccess(); }
        });
        document.addEventListener('touchend', () => { if (!isD) return; isD = false; h.style.transition = 'transform 0.3s'; h.style.transform = 'translateX(0px)'; p.style.width = '0'; });

        function showSuccess() {
            document.getElementById('retiroConfirmView').style.display = 'none';
            document.getElementById('retiroSuccessView').style.display = 'block';
        }
    </script>
</body>
</html>
