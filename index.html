<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skipit Clone - Experimento</title>
    <link rel="icon" type="image/png" href="https://pedi.skipit.com.ar/assets/skipit_logo-982ff30d.png">
    <style>
        :root {
            --primary-dark: #04252B;
            --text-main: #0A1112;
            --gray-text: #666;
            --border-light: #E0E0E0;
            --bg-gray: #F8F9F9;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Manrope', sans-serif, Arial;
            background-color: white;
            color: var(--text-main);
            -webkit-tap-highlight-color: transparent;
        }

        .view {
            display: none;
            padding-bottom: 80px;
            animation: fadeIn 0.2s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .view.active { display: block; }

        header {
            padding: 30px 20px 15px 20px;
            font-size: 28px;
            font-weight: 800;
        }

        /* --- Estilos de la Pantalla de Pagos --- */
        .section-title {
            padding: 10px 20px;
            font-size: 14px;
            font-weight: 600;
            color: var(--gray-text);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .payment-item {
            display: flex;
            align-items: center;
            padding: 18px 20px;
            border-bottom: 1px solid var(--border-light);
            cursor: pointer;
        }

        .payment-item .icon-card {
            width: 40px;
            height: 25px;
            background: #f0f0f0;
            border-radius: 4px;
            margin-right: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: bold;
            color: #1A1F71; /* Color Visa */
        }

        .payment-info { flex-grow: 1; }
        .payment-info .name { font-weight: 600; font-size: 16px; }
        .payment-info .details { font-size: 12px; color: var(--gray-text); }

        .add-payment {
            display: flex;
            align-items: center;
            padding: 18px 20px;
            color: var(--text-main);
            font-weight: 600;
            cursor: pointer;
        }

        .add-circle {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: 2px solid var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 15px;
            font-size: 18px;
        }

        /* --- Barra de Navegación --- */
        nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 70px;
            background: white;
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid var(--border-light);
            z-index: 1000;
        }

        .nav-item {
            border: none;
            background: none;
            padding: 10px;
            color: #C4C4C4;
            transition: color 0.2s;
        }

        .nav-item.active { color: var(--primary-dark); }

        /* Estilos Home (Mismo de antes) */
        .banner { width: 100%; aspect-ratio: 2/1; background: url('https://assets.skipit.com.ar/60/banner_60_1770935652578') center/cover; }
        .commerce-info { padding: 15px; display: flex; align-items: center; gap: 12px; }
        .commerce-info img { width: 50px; height: 50px; border-radius: 8px; }
    </style>
</head>
<body>

    <div id="home" class="view active">
        <div class="banner"></div>
        <div class="commerce-info">
            <img src="https://802342-menu-img.s3.us-east-2.amazonaws.com/60/logo_60_1742138900273" alt="Logo">
            <div>
                <div style="font-weight: 700; font-size: 18px;">Rabieta Palermo</div>
                <div style="font-size: 12px; color: var(--gray-text);">Ingreso - .</div>
            </div>
        </div>
    </div>

    <div id="payment" class="view">
        <header>Pagos</header>
        
        <div class="section-title">Medios de pago</div>
        
        <div class="payment-item">
            <div class="icon-card">VISA</div>
            <div class="payment-info">
                <div class="name">Visa **** 4444</div>
                <div class="details">Vence 12/29</div>
            </div>
            <div style="color: #CCC;">&rsaquo;</div>
        </div>

        <div class="add-payment">
            <div class="add-circle">+</div>
            <span>Agregar nuevo medio de pago</span>
        </div>
    </div>

    <div id="withdraw" class="view">
        <header>Retiros</header>
        <div style="padding: 20px; color: var(--gray-text);">No tienes retiros pendientes.</div>
    </div>

    <div id="perfil" class="view">
        <header>Cuenta</header>
        <div style="padding: 20px; display: flex; align-items: center; gap: 15px;">
            <svg width="50" height="50" viewBox="0 0 22 22" fill="none"><circle cx="11.2" cy="7.2" r="4.3" fill="#C4C4C4"/><path d="M11.2 0C5.3 0 .5 4.8.5 10.8s4.8 10.8 10.7 10.8 10.8-4.8 10.8-10.8S17.1 0 11.2 0zM18.7 16.4c-.7-2.4-3-4.2-5.6-4.2h-3.7c-2.7 0-4.9 1.8-5.7 4.2C2.6 14.8 1.9 12.9 1.9 10.8c0-5.2 4.2-9.4 9.3-9.4s9.4 4.2 9.4 9.4c0 2.1-.7 4-1.9 5.6z" fill="#C4C4C4"/></svg>
            <div>
                <div style="font-weight: 700; font-size: 20px;">joniker Ormaetxea</div>
                <div style="font-size: 13px; color: var(--gray-text);">joniorma123@gmail.com</div>
            </div>
        </div>
    </div>

    <nav>
        <button class="nav-item active" onclick="switchView('home', this)">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        </button>
        <button class="nav-item" onclick="switchView('payment', this)">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
                <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
            </svg>
        </button>
        <button class="nav-item" onclick="switchView('withdraw', this)">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
        </button>
        <button class="nav-item" onclick="switchView('perfil', this)">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </button>
    </nav>

    <script>
        function switchView(viewId, btn) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            window.scrollTo(0,0);
        }
    </script>
</body>
</html>
